# Build release artifacts and publish to GitHub Releases when a version tag is pushed (e.g. v0.2.0).
# The tag (without "v") must match version in cmd/sshui/main.go.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Match tag to main.go version
        run: |
          set -euo pipefail
          TAG_VER="${GITHUB_REF_NAME#v}"
          CODE_VER=$(sed -n 's/^[[:space:]]*version[[:space:]]*=[[:space:]]*"\([^"]*\)".*/\1/p' cmd/sshui/main.go | head -1)
          echo "Tag version: $TAG_VER (from $GITHUB_REF_NAME)"
          echo "main.go version: $CODE_VER"
          if [ "$TAG_VER" != "$CODE_VER" ]; then
            echo "::error::Push tag v$CODE_VER to match version in cmd/sshui/main.go, or bump main.go before tagging."
            exit 1
          fi
          echo "VERSION=$TAG_VER" >> "$GITHUB_ENV"

      - name: Test
        run: go test ./...

      - name: Build release artifacts
        run: make packages VERSION="$VERSION"

      - name: SHA256 checksums
        working-directory: dist
        run: |
          set -euo pipefail
          : > SHA256SUMS
          for f in *.deb *.rpm *.apk *.tar.gz; do
            [ -f "$f" ] && sha256sum "$f" >> SHA256SUMS
          done
          sort -k2 -o SHA256SUMS SHA256SUMS
          test -s SHA256SUMS
          cat SHA256SUMS

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/*.deb
            dist/*.rpm
            dist/*.apk
            dist/*.tar.gz
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
